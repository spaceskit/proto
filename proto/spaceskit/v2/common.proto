  string install_hint = 11;
  string base_url = 12;
  repeated string models = 13;
  google.protobuf.Timestamp last_checked_at = 14;
  string error_message = 15;
}

message IntegrationRequest {
  string integration_request_id = 1;
  IntegrationClass integration_class = 2;
  string requested_name = 3;
  string use_case = 4;
  string source_url = 5;
  string notes = 6;
  string principal_id = 7;
  string device_id = 8;
  string status = 9;
  google.protobuf.Timestamp created_at = 10;
  google.protobuf.Timestamp updated_at = 11;
}

// ---------------------------------------------------------------------------
// Agent assignment — how agents are enrolled in spaces
// ---------------------------------------------------------------------------

message SpaceAgentAssignment {
  string space_id = 1;
  string agent_id = 2;
  string profile_id = 3;
  // Override the profile's default security scope for this space.
  AgentSecurityScope security_scope = 4;
  // Role within this space.
  CoordinatorRole role = 5;
  // Turn order position (for sequential strategies).
  int32 turn_order = 6;
  // Whether this is the primary agent (for primary_only strategy).
  bool is_primary = 7;
  google.protobuf.Timestamp assigned_at = 8;
}

// ---------------------------------------------------------------------------
// Turn model configuration — detailed settings per strategy
// ---------------------------------------------------------------------------

message TurnModelConfig {
  TurnModelStrategy strategy = 1;

  // For DEBATE_SYNTHESIS:
  int32 debate_rounds = 2;           // Number of rounds before synthesis
  string synthesizer_agent_id = 3;   // Who synthesizes (empty = moderator)

  // For PARALLEL_RACE:
  int32 race_timeout_seconds = 4;    // How long to wait for all agents

  // For ROUND_ROBIN:
  int32 max_rounds = 5;              // Max full rotations (0 = unlimited)

  // For ADAPTIVE_AUTO:
  string adaptation_policy = 6;      // e.g. "cost_optimize", "quality_first"

  // For SEQUENTIAL_ALL:
  bool stop_on_first_failure = 7;    // Whether one agent failing stops the chain
}
