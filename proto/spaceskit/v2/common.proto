}

message IntegrationCatalogEntry {
  string integration_id = 1;
  string display_name = 2;
  IntegrationClass integration_class = 3;
  IntegrationStatus status = 4;
  bool recommended = 5;
  bool configured = 6;
  bool reachable = 7;
  bool install_detected = 8;
  bool supports_hosted_billing = 9;
